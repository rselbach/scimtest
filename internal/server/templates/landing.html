<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>scimtest server</title>
<style>
:root { color-scheme: light; --bg: #f6f7f9; --card: #fff; --text: #1f2937; --muted: #64748b; --line: #dce1e8; --accent: #155eef; }
* { box-sizing: border-box; }
body { min-height: 100vh; margin: 0; display: grid; place-items: center; background: var(--bg); color: var(--text); font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
main { width: min(420px, calc(100% - 32px)); padding: 28px; background: var(--card); border: 1px solid var(--line); border-radius: 10px; }
h1 { margin: 0 0 6px; font-size: 26px; }
p { margin: 0 0 22px; color: var(--muted); }
a { display: inline-flex; min-height: 38px; align-items: center; padding: 8px 14px; border-radius: 7px; background: var(--accent); color: #fff; font-weight: 600; text-decoration: none; }
</style>
</head>
<body>
<main>
  <h1>scimtest server</h1>
  <p>Sign in with the authorized GitHub account to manage applications and tunnels.</p>
  <a href="/login/github">Sign in with GitHub</a>
</main>
</body>
</html>
