version: 2

project_name: scimtest

builds:
  - id: scimtest
    main: ./cmd/scimtest
    binary: scimtest
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X=github.com/rselbach/scimtest/internal/web.tunnelApplicationProfileID={{ .Env.SCIMTEST_APPLICATION_PROFILE_ID }}
      - -X=github.com/rselbach/scimtest/internal/web.tunnelApplicationPrivateSeed={{ .Env.SCIMTEST_APPLICATION_PRIVATE_SEED_BASE64 }}
      - -X=github.com/rselbach/scimtest/internal/web.tunnelReleaseIdentityRequired=true
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
  - id: scimtest-server
    main: ./cmd/scimtest-server
    binary: scimtest-server
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: scimtest
    ids:
      - scimtest
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
  - id: scimtest-server
    ids:
      - scimtest-server
    formats:
      - tar.gz
    name_template: >-
      scimtest-server_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: checksums.txt

changelog:
  sort: asc

brews:
  - name: scimtest
    ids:
      - scimtest
    repository:
      owner: rselbach
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: https://github.com/rselbach/scimtest
    description: Local SCIM/OIDC/SAML auth testing service
    license: MIT
    test: |
      system "#{bin}/scimtest", "--help"
