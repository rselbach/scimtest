version: 2

project_name: scimtest

builds:
  - id: scimtest
    main: .
    binary: scimtest
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: scimtest
    ids:
      - scimtest
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: checksums.txt

changelog:
  sort: asc

brews:
  - name: scimtest
    ids:
      - scimtest
    repository:
      owner: rselbach
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: https://github.com/rselbach/scimtest
    description: Local SCIM/OIDC/SAML auth testing service
    license: MIT
    test: |
      system "#{bin}/scimtest", "--help"
