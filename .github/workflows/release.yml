name: Release

on:
  push:
    tags:
      - v*

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Check Homebrew tap token
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          if [ -z "${TAP_GITHUB_TOKEN}" ]; then
            echo "::error::Set TAP_GITHUB_TOKEN with write access to rselbach/homebrew-tap"
            exit 1
          fi

      - name: Check tunnel application identity
        env:
          SCIMTEST_APPLICATION_PROFILE_ID: ${{ vars.SCIMTEST_APPLICATION_PROFILE_ID }}
          SCIMTEST_APPLICATION_PRIVATE_SEED_BASE64: ${{ secrets.SCIMTEST_APPLICATION_PRIVATE_SEED_BASE64 }}
        run: |
          if [[ ! "${SCIMTEST_APPLICATION_PROFILE_ID}" =~ ^[a-f0-9]{32}$ ]]; then
            echo "::error::Set SCIMTEST_APPLICATION_PROFILE_ID to the application profile ID"
            exit 1
          fi
          if [[ -z "${SCIMTEST_APPLICATION_PRIVATE_SEED_BASE64}" ]]; then
            echo "::error::Set SCIMTEST_APPLICATION_PRIVATE_SEED_BASE64 to a base64-encoded 32-byte Ed25519 seed"
            exit 1
          fi
          if ! python3 -c 'import base64, os; assert len(base64.b64decode(os.environ["SCIMTEST_APPLICATION_PRIVATE_SEED_BASE64"], validate=True)) == 32'; then
            echo "::error::SCIMTEST_APPLICATION_PRIVATE_SEED_BASE64 must encode exactly 32 bytes"
            exit 1
          fi

      - name: Release
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
          SCIMTEST_APPLICATION_PROFILE_ID: ${{ vars.SCIMTEST_APPLICATION_PROFILE_ID }}
          SCIMTEST_APPLICATION_PRIVATE_SEED_BASE64: ${{ secrets.SCIMTEST_APPLICATION_PRIVATE_SEED_BASE64 }}
